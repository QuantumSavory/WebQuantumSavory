env:
  CI: "true"
  JULIA_NUM_THREADS: auto

steps:
  - label: ":julia: Backend unit"
    key: backend-unit
    command: ./ci/backend-unit.sh
    plugins:
      - JuliaCI/julia#v1:
          version: "1.12"
    timeout_in_minutes: 45

  - label: ":julia: MCP unit"
    key: mcp-unit
    command: ./ci/mcp-unit.sh
    concurrency: 1
    concurrency_group: "webquantumsavory/server"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.12"
    artifact_paths: "ci-artifacts/**/*"
    timeout_in_minutes: 60

  - label: ":nodejs: Frontend version and build"
    key: frontend-build
    command: ./ci/frontend-build.sh
    plugins:
      - mise#v1.1.4:
          version: "2026.7.2"
    timeout_in_minutes: 20

  - label: ":julia: Backend integration"
    key: backend-integration
    command: ./ci/backend-integration.sh
    concurrency: 1
    concurrency_group: "webquantumsavory/server"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.12"
      - mise#v1.1.4:
          version: "2026.7.2"
    artifact_paths: "ci-artifacts/**/*"
    timeout_in_minutes: 60

  - label: ":chromium: Full Chromium"
    key: browser
    command: ./ci/browser.sh
    concurrency: 1
    concurrency_group: "webquantumsavory/server"
    depends_on: backend-integration
    allow_dependency_failure: true
    env:
      PLAYWRIGHT_INSTALL_SYSTEM_DEPS: "true"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.12"
      - mise#v1.1.4:
          version: "2026.7.2"
    artifact_paths: "ci-artifacts/**/*"
    timeout_in_minutes: 60
