name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Backend unit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.12"
      - uses: julia-actions/cache@v3
        with:
          delete-old-caches: "false"
          save-always: "false"
      - run: ./ci/backend-unit.sh

  mcp-unit:
    name: MCP unit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.12"
      - uses: julia-actions/cache@v3
        with:
          delete-old-caches: "false"
          save-always: "false"
      - run: ./ci/mcp-unit.sh

  frontend-build:
    name: Frontend version and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - run: ./ci/frontend-build.sh

  backend-integration:
    name: Backend integration
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.12"
      - uses: julia-actions/cache@v3
        with:
          delete-old-caches: "false"
          save-always: "false"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - run: ./ci/backend-integration.sh
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-integration-diagnostics
          path: ci-artifacts/
          if-no-files-found: ignore
          retention-days: 7

  browser:
    name: Full Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.12"
      - uses: julia-actions/cache@v3
        with:
          delete-old-caches: "false"
          save-always: "false"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - run: ./ci/browser.sh
        env:
          PLAYWRIGHT_INSTALL_SYSTEM_DEPS: "true"
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-diagnostics
          path: ci-artifacts/
          if-no-files-found: ignore
          retention-days: 7
